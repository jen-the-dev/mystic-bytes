name: Developer Programmer
headline: ""
location_line: "Louisiana, US → Auckland, NZ (2027)"
intro: "Developer Programmer (ANZSCO 261312) focused on indie software, tools/engine-adjacent systems, and accessible interactive UI. Builds Swift, Rust, TypeScript, and web systems with strong attention to state, tooling, documentation, and long-session usability. Public portfolio demonstrates transferable game-programming foundations across Apple platforms and interactive systems."
