    value: "Swift 6 · SwiftUI · state machines · real-time UI patterns · Scryfall API integration"
  - label: Tools & engine-adjacent programming
    value: "Rust · TypeScript · Python · command workflows · developer tooling · automation"
  - label: Accessible game-adjacent UI
    value: "VoiceOver · Dynamic Type · keyboard-first UX · WCAG 2.1 AA · long-session interface design"
  - label: Delivery & production craft
    value: "GitHub Actions · Docker · release engineering · technical documentation · code review"
