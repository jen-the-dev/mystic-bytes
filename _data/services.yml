tagline: "contract work · fixed packages · no equity-only"
lede: "Apple-platform software, accessibility, AI integration, and Louisiana Gulf Fix & Fish days for yacht owners who want tech support without skipping the charter. Rates are modelled on an Auckland AEWV senior IC package plus a settling stipend — so retainers read like sponsorship-shaped monthly capacity. Remote, hybrid, and on-site work included at these rates."

rate_basis: "Benchmark: Auckland AEWV market for senior Developer Programmer (~NZD $150,000 / year) plus NZD $2,000 / month housing–settling stipend ≈ NZD $14,500 / month fully shaped. The 80-hour retainer is the half-time version with a light contract premium; the full-time line doubles that capacity. AUD/USD invoices use mid-market FX. Fix & Fish is a separate Louisiana field day-rate (diagnostic gate required)."

specs:
  - label: hourly_rate
    value: "NZD $205 · USD $120 · 4–8 hour minimum"
  - label: rate_basis
    value: "Auckland AEWV senior IC + NZD $2k/mo stipend"
  - label: part_time
    value: "80 hrs / month · NZD $16,400 · USD $9,600"
  - label: payment
    value: "PayPal · Wise · AUD/NZD/USD at mid-market rate"
  - label: full_time
    value: "160 hrs / month · NZD $32,800 · USD $19,200"
  - label: engagement
    value: "Remote · hybrid · on-site · Louisiana field"
  - label: employment
    value: "Full-time / sponsored roles → see CV"
  - label: availability
    value: "Open for new clients · ~1 Fix & Fish / week"

rules:
  - "Nothing unpaid — spec work and ‘exposure’ are declined."
  - "Rush timelines billed at 2× for inconvenience."
  - "No equity-only engagements."
  - "No CMS builds, finance products, or medical software."
  - "Human approval on what ships — AI assists; you lead."
  - "Fix & Fish: dockside diagnostic first; client vessel or client-hired charter; client buys parts; you provision food."

realms:
  - id: fix_and_fish
    title: fix & fish
    badge: FIELD
    section_num: "00"
    summary: "Louisiana Gulf · your yacht or a charter you hire · I fix what plugs in while your guests fish · up to 3–4 computers with advance notice · ~1 booking / week"
    booking:
      label: "Request Fix & Fish →"
      href: "/contact/?intent=fix-and-fish"
      note: "Include marina, vessel type, device count, and half- or full-day preference."
    proof: []
    packages:
      - name: Dockside Diagnostic
        price: "$420 USD"
        timeline: "1–2 hours · required before any Fix & Fish day"
        includes:
          - "On-vessel or marina meetup — triage devices, network, and whatever plugs in"
          - "Written go / no-go: software-fixable today vs parts required"
          - "Parts list for anything you need to buy (client purchases; I do not stock hardware)"
          - "Full credit toward Half-Day or Full-Day Fix & Fish if booked within 30 days"
        excludes:
          - "Fishing time · motherboard soldering · screen replacement · board-level repair"
          - "Charter day itself (book after diagnostic clears or after parts arrive)"
      - name: Half-Day Fix & Fish
        price: "$1,650 USD"
        timeline: "~4 hours tech capacity · parallel with your charter"
        includes:
          - "Up to 3–4 computers / devices with advance notice — MacBook software repairs and connected gear"
          - "You and guests fish; I work until problems are solved, then I may join the line"
          - "Your yacht or a vessel you charter — I am IT crew, not the captain"
          - "Optional galley prep if you supply the food — catered, dock restaurant, or coolers are fine"
          - "Alcohol at your discretion (BYO / your tab)"
        excludes:
          - "Food cost (you feed yourselves and me) · parts · travel beyond the local Gulf day"
          - "Motherboard soldering · screen replacements · more than 4 machines without a custom brief"
          - "Charter hire, fuel, slip, or captain fees (your arrangement)"
      - name: Full-Day Fix & Fish
        price: "$2,850 USD"
        timeline: "~6–8 hours tech capacity · parallel with your charter"
        includes:
          - "Same scope as Half-Day with a full charter window — up to 3–4 computers with advance notice"
          - "Diagnostic credit applied if Dockside Diagnostic was paid within 30 days"
          - "Weather / parts pause: if hardware is required, the charter day waits until parts arrive — no soldering, no screen swaps"
          - "Out-of-area yachts: this day-rate plus travel billed at USD $120 / hr and lodging at cost"
        excludes:
          - "Food cost · parts · charter vessel hire"
          - "Motherboard soldering · screen replacements · open-ended office IT retainers (see technology)"

  - id: technology
    title: technology
    badge: TECH
    section_num: "01"
    summary: "iOS/macOS · AI integration · accessibility · Rails/web · devops · technical documentation"
    proof:
      - label: NeuroShell
        href: "https://github.com/jv-darkheartlabs/NeuroShell"
      - label: accessibility-rails-components
        href: "https://github.com/jv-darkheartlabs/accessibility-rails-components"
    packages:
      - name: Accessibility Audit
        price: "$1,800 USD"
        timeline: "Typically 5–10 business days"
        includes:
          - "WCAG 2.1 AA review of one app surface or web property"
          - "Written findings report with severity and fix order"
          - "Top-priority remediation notes — not a checkbox PDF"
        excludes:
          - "Full implementation (available as sprint or retainer)"
      - name: Build Sprint
        price: "$5,400 USD"
        timeline: "40 focused hours · ~1 week calendar"
        includes:
          - "One scoped slice — feature, integration, or doc pass"
          - "README-scale web work, AI/MCP wiring, or a11y fixes"
          - "Handoff notes and one revision round on deliverables"
        excludes:
          - "Open-ended backlog without a written scope"
      - name: Engineering Retainer
        price: "NZD $16,400 · USD $9,600 / month"
        timeline: "80 hours · monthly cadence · AEWV-shaped"
        includes:
          - "Sustained IC work across your stack"
          - "Code review, docs, CI/devops, and accessibility hardening"
          - "Priced as Auckland AEWV senior package + stipend, half-time delivery"
          - "Remote, hybrid, or on-site · async standups — no meeting theatre"
        excludes:
          - "CMS · finance · medical"

open_source:
  title: open source
  blurb: "Paid advisory on the same NZD $205 / USD $120 hourly · 4 hour minimum. Sponsorship tiers and maintainer support — contact with repo context."

cta:
  label: "Request a brief"
  href: "/contact/"
  note: "Include package name, timeline, and budget. For Fix & Fish: marina, vessel type, device count, and preferred half- or full-day. Rush requests noted upfront."
