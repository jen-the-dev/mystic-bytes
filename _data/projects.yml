# Projects
- project: NeuroShell
  role: Creator & Lead Developer
  duration: 2024 – Present
  url: "https://github.com/jen-the-dev/neuroshell"
  description: >
    Open-source terminal application and AI productivity suite for macOS, built for developers with ADHD and cognitive differences.
    Features include plain-English AI command input, Where Was I? session recovery (⌘⌥W), procedurally generated nature audio, focus timers,
    breathing tools, hydration and posture reminders, and a full accessibility settings layer.
    Winner of the Human-Focused AI Award at the Tetrate Buildathon — selected from 170+ applicants.
    "NeuroShell puts AI to work while centering real human value." — Birger Moëll, Associate Professor in Computational Linguistics, Uppsala University.
    v2 shipped. v3 in active development.

