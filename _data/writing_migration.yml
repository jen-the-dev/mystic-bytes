# Tag taxonomy for blog migration → Dark Heart Labs writing
# Display tags only; hashnode is a frontmatter flag, not a nav tag.

craft:
  label: craft
  description: Developer craft, tools, and practice

ops:
  label: ops
  description: Deployment, infrastructure, and production

design:
  label: design
  description: UI, aesthetics, accessibility, naming

ai:
  label: ai
  description: AI tooling, automation, pair programming

culture:
  label: culture
  description: Teams, review, documentation, collaboration

travel:
  label: travel
  description: Nomad logistics and remote work on the road

oceania:
  label: oceania
  description: New Zealand, Australia, and Pacific field notes

wellness:
  label: wellness
  description: Aromatherapy and sensory recovery for builders

games:
  label: games
  description: Games as systems thinking

film:
  label: film
  description: Film, mythology, and narrative craft

# Folder → collection + default tags
routing:
  the-craft:
    collection: essays
    tags: [craft]
  philosophy-of-practice:
    collection: essays
    tags: [craft]
  design-aesthetics:
    collection: essays
    tags: [design, craft]
  collaboration-culture:
    collection: essays
    tags: [culture]
  ai-automation:
    collection: essays
    tags: [ai, craft]
  music-games:
    collection: essays
    tags: [games, craft]
  mythology-film:
    collection: essays
    tags: [film, craft]
  deployment-operations/dev-essays:
    collection: essays
    tags: [ops]
  deployment-operations/infrastructure-docs:
    collection: essays
    tags: [ops]
    status: sanitize-or-exclude
  transmissions:
    collection: essays
    tags: [craft]
  travel:
    collection: journal
    tags: [travel]
  travel/destinations:
    collection: journal
    tags: [travel, oceania]
  aromatherapy-blog:
    collection: wellness
    tags: [wellness]

